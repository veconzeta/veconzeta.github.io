<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veconzeta | Portafolio </title>
    <style>
        :root {
            --vz-violet: #6C4BFF;
            --vz-violet-glow: rgba(108, 75, 255, 0.6);
            --vz-neon-pink: #FF2A6D;
            --bg-dark: #05030A;
            --text-main: #E0E0E0;
            --text-muted: #888899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden; /* Mantiene la viñeta y los paneles fijos */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- IMAGEN DE FONDO --- */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
        }

        /* --- CAPA DE CRISTAL OSCURO --- */
        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(5, 3, 10, 0.8) 0%, rgba(5, 3, 10, 0.95) 100%);
            backdrop-filter: blur(3px);
            z-index: -1;
            pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 30px 50px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            z-index: 5; /* Asegura que el header esté sobre el fondo */
        }

        .hero-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            perspective: 1000px;
            z-index: 5; /* Asegura que el contenido esté sobre el fondo */
        }

        .main-logo {
            width: 750px;
            max-width: 90vw;
            height: auto;
            margin-bottom: 50px;
            filter: drop-shadow(0 0 35px var(--vz-violet-glow)) drop-shadow(0 5px 15px rgba(0,0,0,0.8));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .nav-grid {
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        /* --- BOTONES CON RESPLANDOR VIOLETA --- */
        .nav-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(108, 75, 255, 0.3);
            padding: 15px 30px;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .nav-btn:hover {
            background: rgba(108, 75, 255, 0.15); /* Fondo violeta suave */
            border-color: var(--vz-violet); /* Borde violeta brillante */
            transform: translateY(-5px);
            /* Resplandor violeta que imita el logo */
            box-shadow: 0 0 20px var(--vz-violet-glow), 0 10px 30px rgba(0, 0, 0, 0.5);
            color: #fff;
            text-shadow: 0 0 8px var(--vz-violet);
        }

        /* --- GAVETA DE FEEDBACK (DESLIZA HACIA ARRIBA) --- */
        .feedback-drawer {
            position: fixed;
            bottom: -300px; /* Oculta por defecto abajo */
            left: 0;
            width: 100vw;
            height: 300px;
            background: rgba(5, 3, 10, 0.85);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(108, 75, 255, 0.3);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.9);
            transition: bottom 0.5s cubic-bezier(0.25, 1, 0.5, 1); /* Transición suave */
            z-index: 90; /* Debajo del panel lateral, pero sobre el fondo */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .feedback-drawer.open {
            bottom: 0; /* Se desliza hacia arriba */
        }

        /* Botón/pestaña visible que abre la gaveta */
        .feedback-trigger {
            position: absolute;
            top: -45px; /* Justo arriba del panel */
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 25px;
            background: rgba(5, 3, 10, 0.95);
            border: 1px solid rgba(108, 75, 255, 0.4);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            z-index: 91;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        .feedback-trigger:hover {
            background: rgba(108, 75, 255, 0.2);
            box-shadow: 0 -5px 15px rgba(108, 75, 255, 0.3);
        }

        .feedback-trigger span {
            color: var(--vz-violet);
            text-shadow: 0 0 5px var(--vz-violet-glow);
        }

        .feedback-trigger .muted-text {
            color: var(--text-muted);
            text-shadow: none;
        }

        /* Contenido interior de la gaveta de feedback */
        .feedback-content {
            padding: 40px;
            text-align: center;
            max-width: 800px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .feedback-title {
            color: var(--text-main);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        /* --- PANEL LATERAL DE BIOGRAFÍA (SE MANTIENE IGUAL) --- */
        .bio-panel {
            position: fixed;
            top: 0;
            right: -380px;
            width: 380px;
            height: 100vh;
            background: rgba(5, 3, 10, 0.85);
            backdrop-filter: blur(15px);
            border-left: 1px solid rgba(108, 75, 255, 0.3);
            box-shadow: -10px 0 40px rgba(0,0,0,0.9);
            transition: right 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 100; /* Sobre la gaveta inferior */
            display: flex;
            align-items: center;
        }

        .bio-panel.open {
            right: 0;
        }

        .bio-tab {
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 160px;
            background: rgba(5, 3, 10, 0.9);
            border: 1px solid rgba(108, 75, 255, 0.4);
            border-right: none;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify
