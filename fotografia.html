<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veconzeta | Fotografía</title>
    <style>
        :root {
            --vz-violet: #6C4BFF;
            --vz-violet-glow: rgba(108, 75, 255, 0.7);
            --bg-dark: #05030A;
            --text-main: #E0E0E0;
            --text-muted: #888899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            height: 100svh; /* Ocupa el alto real del dispositivo */
            width: 100vw;
        }

        /* --- FONDO --- */
        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(5, 3, 10, 0.4) 0%, rgba(5, 3, 10, 0.95) 100%);
            backdrop-filter: blur(10px); z-index: -1;
        }

        /* --- HEADER COMPACTO --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%;
            font-family: 'Courier New', monospace; font-size: 0.7rem;
            letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted); z-index: 50;
        }

        .back-btn {
            color: white; text-decoration: none; border: 1px solid var(--vz-violet);
            padding: 6px 15px; border-radius: 4px; background: rgba(108, 75, 255, 0.1);
            transition: 0.3s; cursor: pointer;
        }

        .page-title {
            text-align: center; font-family: 'Courier New', monospace;
            font-size: 2.5rem; letter-spacing: 12px; color: white;
            text-shadow: 0 0 20px var(--vz-violet-glow);
            margin-top: 10px; /* Mantiene el título arriba */
        }

        /* --- CARRUSEL: EJE ELEVADO --- */
        .carousel-wrapper {
            flex: 1; 
            display: flex; align-items: center; justify-content: center;
            width: 100%; position: relative; z-index: 10;
            margin-top: -8vh; /* ESTO SUBE EL EJE DE LOS ÁLBUMES */
        }
        
        .carousel-track-container { width: 100%; max-width: 1200px; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; perspective: 1500px; }
        .carousel-track { position: relative; width: 550px; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .album-card {
            position: absolute; top: 0; left: 0; width: 100%; aspect-ratio: 16 / 9; 
            background: #000; border: 1px solid rgba(108, 75, 255, 0.2);
            border-radius: 10px; cursor: pointer; overflow: hidden;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .album-cover { 
            width: 100%; height: 100%; 
            object-fit: cover; /* Asegura 16:9 sin deformar fotos verticales */
            position: absolute; z-index: 1; 
            filter: brightness(0.6); transition: 0.5s; 
        }
        .album-card.active .album-cover { filter: brightness(1); }
        .album-card.active { border-color: var(--vz-violet); box-shadow: 0 0 40px var(--vz-violet-glow); }

        /* TÍTULOS ESTILO ORIGINAL */
        .album-info { 
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 25px 15px 15px; z-index: 2;
            background: linear-gradient(to top, rgba(5, 3, 10, 0.9), transparent);
            pointer-events: none;
        }
        .album-info h3 { font-family: 'Courier New', monospace; font-size: 1.1rem; color: white; letter-spacing: 2px; }
        .album-info p { font-size: 0.7rem; color: var(--vz-violet); text-transform: uppercase; font-weight: bold; }

        .nav-arrow {
            background: none; border: none; color: rgba(255, 255, 255, 0.2);
            font-size: 4rem; cursor: pointer; padding: 30px; z-index: 100;
            transition: 0.3s;
        }

        .floating-contact { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 1500; }
        .contact-icon { width: 50px; height: 50px; background: rgba(5, 3, 10, 0.9); border: 1px solid var(--vz-violet); border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 12px; }

        /* --- GALERÍA (OVERLAY) --- */
        .gallery-overlay {
            position: fixed; top: 100vh; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 3, 10, 0.98); backdrop-filter: blur(25px);
            z-index: 2000; overflow-y: auto; transition: top 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .gallery-overlay.open { top: 0; }
        .masonry-container { padding: 30px 5%; column-count: 4; column-gap: 15px; }
        .masonry-item { margin-bottom: 15px; break-inside: avoid; border-radius: 6px; overflow: hidden; cursor: pointer; }
        .masonry-item img { width: 100%; display: block; }

        @media (max-width: 768px) {
            .carousel-track { width: 85vw; }
            .carousel-wrapper { margin-top: -12vh; }
            .page-title { font-size: 1.8rem; letter-spacing: 6px; }
            .nav-arrow { display: none; }
            .masonry-container { column-count: 2; }
        }
    </style>
</head>
<body id="mainBody">
    <video autoplay muted loop playsinline class="bg-image"><source src="VIDEO/webbg.mp4" type="video/mp4"></video>
    <div class="ambient-bg"></div>

    <div class="floating-contact">
        <a href="https://wa.me/56932751639" target="_blank" class="contact-icon"><img src="ICON/social.png" alt="W" style="width:100%"></a>
        <a href="mailto:contacto.veconzeta@gmail.com" class="contact-icon"><img src="ICON/gmail.png" alt="M" style="width:100%"></a>
    </div>

    <header>
        <a href="index.html" class="back-btn">[ VOLVER AL INICIO ]</a>
        <div>SYS.VECONZETA // PHOTOGRAPHY_MODULE</div>
    </header>

    <h1 class="page-title">FOTOGRAFÍA</h1>

    <div class="carousel-wrapper">
        <button class="nav-arrow" id="prevBtn">&#10094;</button>
        <div class="carousel-track-container">
            <div class="carousel-track" id="track"></div>
        </div>
        <button class="nav-arrow" id="nextBtn">&#10095;</button>
    </div>

    <div class="gallery-overlay" id="galleryOverlay">
        <div style="padding: 20px 5%; display: flex; justify-content: space-between; position: sticky; top: 0; background: rgba(5,3,10,0.9); z-index: 10;">
            <h2 id="galleryTitle" style="font-family:'Courier New', monospace; letter-spacing:3px;">ÁLBUM</h2>
            <button class="back-btn" onclick="closeGallery()">[ X CERRAR ÁLBUM ]</button>
        </div>
        <div class="masonry-container" id="masonryContainer"></div>
    </div>

    <script>
        const ROOT = "PORTAFOLIO_FOTOGRAFIAS";
        const albumData = {
            0: Array.from({length: 51}, (_, i) => `${ROOT}/01_EVENTOS/EVENTOS_${i + 1}.jpg`),
            1: Array.from({length: 12}, (_, i) => `${ROOT}/02_SESIONES_Y_RETRATOS/SESIONES_${i + 1}.jpg`),
            2: Array.from({length: 22}, (_, i) => `${ROOT}/03_PRODUCTO/PRODUCTO_${i + 1}.jpg`),
            3: Array.from({length: 34}, (_, i) => `${ROOT}/04_COSPLAYERS/COSPLAYER_${i + 1}.jpg`)
        };

        const albumTitles = ["ÁLBUM 01 // EVENTOS", "ÁLBUM 02 // SESIONES Y RETRATOS", "ÁLBUM 03 // PRODUCTOS", "ÁLBUM 04 // COSPLAY Y ARTE"];
        const albumSubtitles = ["Eventos", "Sesiones & Retratos", "Productos", "Cosplay & Arte"];

        const track = document.getElementById('track');
        let currentIndex = 0;

        function init() {
            albumTitles.forEach((title, i) => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <img src="${albumData[i][0]}" class="album-cover" alt="${title}">
                    <div class="album-info"><h3>${title}</h3><p>${albumSubtitles[i]}</p></div>
                `;
                card.onclick = () => currentIndex === i ? openGallery(i) : (currentIndex = i, updateCarousel());
                track.appendChild(card);
            });
            updateCarousel();
        }

        function updateCarousel() {
            const cards = document.querySelectorAll('.album-card');
            const isMobile = window.innerWidth <= 768;
            const xOff = isMobile ? window.innerWidth * 0.6 : 420; 
            
            cards.forEach((card, i) => {
                let off = i - currentIndex;
                let dist = Math.abs(off);
                if (off === 0) {
                    card.style.transform = `translateX(0) translateZ(100px) scale(1.1)`;
                    card.style.zIndex = 100; card.style.opacity = 1;
                    card.classList.add('active');
                } else {
                    card.style.transform = `translateX(${off * xOff}px) translateZ(-250px) scale(0.8) rotateY(${off * -15}deg)`;
                    card.style.zIndex = 50 - dist; card.style.opacity = 0.3;
                    card.classList.remove('active');
                }
            });
        }

        document.getElementById('nextBtn').onclick = (e) => { e.stopPropagation(); if(currentIndex < albumTitles.length-1) { currentIndex++; updateCarousel(); } };
        document.getElementById('prevBtn').onclick = (e) => { e.stopPropagation(); if(currentIndex > 0) { currentIndex--; updateCarousel(); } };

        function openGallery(idx) {
            const container = document.getElementById('masonryContainer');
            document.getElementById('galleryTitle').innerText = albumTitles[idx];
            container.innerHTML = '';
            albumData[idx].forEach(url => {
                const item = document.createElement('div');
                item.className = 'masonry-item';
                item.innerHTML = `<img src="${url}" loading="lazy" onerror="this.style.display='none'">`;
                container.appendChild(item);
            });
            document.getElementById('galleryOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeGallery() { document.getElementById('galleryOverlay').classList.remove('open'); document.body.style.overflow = ''; }

        window.addEventListener('resize', updateCarousel);
        init();
    </script>
</body>
</html>
