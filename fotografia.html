<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veconzeta | Fotografía</title>
    <style>
        :root {
            --vz-violet: #6C4BFF;
            --vz-violet-glow: rgba(108, 75, 255, 0.7);
            --bg-dark: #05030A;
            --text-main: #E0E0E0;
            --text-muted: #888899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden; /* Previene scroll innecesario en el eje principal */
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100svh; /* Estándar para móviles modernos */
            width: 100vw;
        }

        body.gallery-open { overflow: hidden; }

        /* --- FONDO --- */
        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(5, 3, 10, 0.4) 0%, rgba(5, 3, 10, 0.9) 100%);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: -1;
        }

        /* --- HEADER COMPACTO --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; /* Reducido para subir el eje */
            font-family: 'Courier New', monospace;
            font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted); z-index: 50;
        }

        .back-btn {
            color: white; text-decoration: none; border: 1px solid var(--vz-violet);
            padding: 6px 12px; border-radius: 4px; background: rgba(108, 75, 255, 0.1);
            transition: all 0.3s ease; cursor: pointer;
        }
        .back-btn:hover { background: var(--vz-violet); box-shadow: 0 0 15px var(--vz-violet-glow); }

        /* --- CARRUSEL ELEVADO --- */
        .carousel-wrapper {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 55vh; 
            position: relative; 
            z-index: 10;
            margin-top: -2vh; /* SUBE EL EJE DE LOS ÁLBUMES */
        }
        
        .nav-arrow {
            background: none; border: none; color: rgba(255, 255, 255, 0.3);
            font-size: 3rem; cursor: pointer; padding: 20px; z-index: 100;
            transition: all 0.3s ease;
        }
        .nav-arrow:hover { color: white; transform: scale(1.1); }

        .carousel-track-container { width: 100%; max-width: 1200px; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; perspective: 1200px; }
        .carousel-track { position: relative; width: 600px; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(0.15, 0.85, 0.35, 1); }
        
        .album-card {
            position: absolute; top: 0; left: 0; width: 100%; aspect-ratio: 16 / 9; 
            background: #000; border: 2px solid rgba(108, 75, 255, 0.1);
            border-radius: 12px; cursor: pointer; overflow: hidden;
            transition: all 0.7s cubic-bezier(0.15, 0.85, 0.35, 1);
            display: flex; align-items: center; justify-content: center;
        }
        
        .album-cover { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; filter: brightness(0.6); transition: 0.5s; }
        .album-card.active .album-cover { filter: brightness(0.95); }
        .album-card.active { border-color: var(--vz-violet); box-shadow: 0 0 50px var(--vz-violet-glow); }

        .album-info { position: relative; z-index: 2; width: 90%; text-align: center; pointer-events: none; }
        .album-info h3 { 
            font-family: 'Courier New', monospace; font-size: 1.6rem; color: white; letter-spacing: 4px; text-transform: uppercase;
            text-shadow: 0 0 10px var(--vz-violet), 0 0 20px var(--vz-violet);
        }

        /* --- TÍTULO INFERIOR --- */
        .bottom-title-wrapper {
            flex-grow: 1;
            display: flex; align-items: center; justify-content: center;
            padding-bottom: 5vh;
        }
        
        .bottom-title {
            text-align: center; font-family: 'Courier New', monospace;
            font-size: 3.5rem; letter-spacing: 15px; color: white;
            font-weight: bold; text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px var(--vz-violet), 0 0 40px var(--vz-violet);
        }

        /* --- CONTACTO --- */
        .floating-contact { position: fixed; bottom: 30px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 1500; }
        .contact-icon { width: 45px; height: 45px; background: rgba(5, 3, 10, 0.8); border: 1px solid var(--vz-violet); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; padding: 10px; }
        .contact-icon img { width: 100%; object-fit: contain; }
        .contact-icon:hover { transform: translateY(-5px); box-shadow: 0 0 15px var(--vz-violet); }

        /* --- GALERÍA (OVERLAY) --- */
        .gallery-overlay {
            position: fixed; top: 100vh; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 3, 10, 0.98); backdrop-filter: blur(25px);
            z-index: 2000; overflow-y: auto; transition: top 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gallery-overlay.open { top: 0; }
        .masonry-container { padding: 30px 5%; column-count: 4; column-gap: 15px; }
        .masonry-item { margin-bottom: 15px; break-inside: avoid; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .masonry-item img { width: 100%; display: block; transition: 0.4s; }
        .masonry-item:hover img { transform: scale(1.03); }

        /* --- LIGHTBOX --- */
        .lightbox-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.98); z-index: 3000; display: flex;
            justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .lightbox-overlay.open { opacity: 1; pointer-events: all; }
        .lightbox-img { max-width: 95vw; max-height: 90vh; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        /* RESPONSIVO */
        @media (max-width: 1024px) { .masonry-container { column-count: 3; } }
        @media (max-width: 768px) {
            .carousel-wrapper { height: 45vh; margin-top: 0; }
            .carousel-track { width: 80vw; }
            .bottom-title { font-size: 1.8rem; letter-spacing: 8px; }
            .masonry-container { column-count: 2; padding: 20px 10px; }
            header { padding: 10px 5%; }
            .nav-arrow { font-size: 2rem; padding: 10px; }
        }
    </style>
</head>
<body id="mainBody">
    <video autoplay muted loop playsinline class="bg-image"><source src="VIDEO/webbg.mp4" type="video/mp4"></video>
    <div class="ambient-bg"></div>

    <div class="floating-contact">
        <a href="https://wa.me/56932751639" target="_blank" class="contact-icon"><img src="ICON/social.png" alt="W"></a>
        <a href="mailto:contacto.veconzeta@gmail.com" class="contact-icon"><img src="ICON/gmail.png" alt="M"></a>
    </div>

    <header>
        <a href="index.html" class="back-btn">[ < VOLVER ]</a>
        <div>SYS.VECONZETA // PHOTOGRAPHY_MODULE</div>
    </header>

    <div class="carousel-wrapper">
        <button class="nav-arrow" id="prevBtn">&#10094;</button>
        <div class="carousel-track-container">
            <div class="carousel-track" id="track"></div>
        </div>
        <button class="nav-arrow" id="nextBtn">&#10095;</button>
    </div>

    <div class="bottom-title-wrapper">
        <h1 class="bottom-title">FOTOGRAFÍA</h1>
    </div>

    <div class="gallery-overlay" id="galleryOverlay">
        <div style="padding: 20px 5%; display: flex; justify-content: space-between; position: sticky; top: 0; background: rgba(5,3,10,0.9); z-index: 10;">
            <h2 id="galleryTitle" style="font-family:'Courier New', monospace; letter-spacing:3px;">ÁLBUM</h2>
            <button class="back-btn" onclick="closeGallery()">[ X CERRAR ]</button>
        </div>
        <div class="masonry-container" id="masonryContainer"></div>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
        <img src="" id="lightboxImage" class="lightbox-img">
    </div>

    <script>
        const ROOT = "PORTAFOLIO_FOTOGRAFIAS";
        const albumData = {
            0: Array.from({length: 51}, (_, i) => `${ROOT}/01_EVENTOS/EVENTOS_${i + 1}.jpg`),
            1: Array.from({length: 12}, (_, i) => `${ROOT}/02_SESIONES_Y_RETRATOS/SESIONES_${i + 1}.jpg`),
            2: Array.from({length: 22}, (_, i) => `${ROOT}/03_PRODUCTO/PRODUCTO_${i + 1}.jpg`),
            3: Array.from({length: 34}, (_, i) => `${ROOT}/04_COSPLAYERS/COSPLAYER_${i + 1}.jpg`)
        };
        const albumTitles = ["EVENTOS SOCIALES", "SESIONES & RETRATOS", "FOTOGRAFÍA PRODUCTO", "COSPLAY & FICCIÓN"];

        const track = document.getElementById('track');
        let currentIndex = 0;

        function init() {
            albumTitles.forEach((title, i) => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <img src="${albumData[i][0]}" class="album-cover" alt="${title}" onerror="this.src='ICON/placeholder.jpg'">
                    <div class="album-info"><h3>${title}</h3></div>
                `;
                card.onclick = () => currentIndex === i ? openGallery(i) : (currentIndex = i, updateCarousel());
                track.appendChild(card);
            });
            updateCarousel();
        }

        function updateCarousel() {
            const cards = document.querySelectorAll('.album-card');
            const isMobile = window.innerWidth <= 768;
            const xOff = isMobile ? window.innerWidth * 0.6 : 450; 
            
            cards.forEach((card, i) => {
                let off = i - currentIndex;
                let dist = Math.abs(off);
                if (off === 0) {
                    card.style.transform = `translateX(0) translateZ(100px) scale(1.15)`;
                    card.style.zIndex = 100; card.style.opacity = 1;
                    card.classList.add('active');
                } else {
                    card.style.transform = `translateX(${off * xOff}px) translateZ(-250px) scale(0.85) rotateY(${off * -15}deg)`;
                    card.style.zIndex = 50 - dist; card.style.opacity = 0.3;
                    card.classList.remove('active');
                }
            });
        }

        document.getElementById('nextBtn').onclick = (e) => { e.stopPropagation(); if(currentIndex < albumTitles.length-1) { currentIndex++; updateCarousel(); } };
        document.getElementById('prevBtn').onclick = (e) => { e.stopPropagation(); if(currentIndex > 0) { currentIndex--; updateCarousel(); } };

        function openGallery(idx) {
            const container = document.getElementById('masonryContainer');
            const title = document.getElementById('galleryTitle');
            title.innerText = albumTitles[idx];
            container.innerHTML = '';

            if(!albumData[idx] || albumData[idx].length === 0) {
                container.innerHTML = "<p style='text-align:center; width:100%; color:gray;'>No se encontraron imágenes en este álbum.</p>";
            } else {
                albumData[idx].forEach(url => {
                    const item = document.createElement('div');
                    item.className = 'masonry-item';
                    item.innerHTML = `<img src="${url}" loading="lazy" onerror="this.parentElement.style.display='none'">`;
                    item.onclick = () => openLightbox(url);
                    container.appendChild(item);
                });
            }
            document.getElementById('galleryOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeGallery() { document.getElementById('galleryOverlay').classList.remove('open'); document.body.style.overflow = ''; }
        function openLightbox(url) { document.getElementById('lightboxImage').src = url; document.getElementById('lightboxOverlay').classList.add('open'); }
        function closeLightbox() { document.getElementById('lightboxOverlay').classList.remove('open'); }

        window.addEventListener('resize', updateCarousel);
        init();
    </script>
</body>
</html>
