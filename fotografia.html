<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veconzeta | Fotografía</title>
    <style>
        :root {
            --vz-violet: #6C4BFF;
            --vz-violet-glow: rgba(108, 75, 255, 0.7);
            --bg-dark: #05030A;
            --text-main: #E0E0E0;
            --text-muted: #888899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
        }

        /* --- VIDEO DE FONDO FIJO --- */
        .bg-image { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: -2; 
        }

        .ambient-bg {
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(5, 3, 10, 0.5) 0%, rgba(5, 3, 10, 0.95) 100%);
            backdrop-filter: blur(5px); 
            -webkit-backdrop-filter: blur(5px);
            z-index: -1;
        }

        /* --- HEADER Y NAVEGACIÓN --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 5% 20px; font-family: 'Courier New', monospace;
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted); z-index: 5;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            border: 1px solid var(--vz-violet);
            padding: 8px 15px;
            border-radius: 5px;
            background: rgba(108, 75, 255, 0.1);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(108, 75, 255, 0.3);
            box-shadow: 0 0 15px var(--vz-violet-glow);
        }

        .page-title {
            text-align: center;
            margin: 10px 0 40px;
            font-family: 'Courier New', monospace;
            font-size: 2.5rem;
            letter-spacing: 8px;
            color: white;
            text-shadow: 0 0 20px var(--vz-violet-glow);
            z-index: 5;
        }

        /* --- BOTONES DE CONTACTO FLOTANTES --- */
        .floating-contact {
            position: fixed; bottom: 80px; right: 25px;
            display: flex; flex-direction: column; gap: 15px; z-index: 1500;
        }

        .contact-icon {
            width: 60px; height: 60px; background: rgba(5, 3, 10, 0.9);
            border: 1px solid var(--vz-violet); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.4s ease; backdrop-filter: blur(5px);
            padding: 12px; animation: contact-pulse 4s infinite;
        }

        @keyframes contact-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0,0,0,0.5); border-color: var(--vz-violet); }
            50% { box-shadow: 0 0 30px var(--vz-violet-glow); border-color: white; transform: scale(1.05); }
        }
        .contact-icon img { width: 100%; height: 100%; object-fit: contain; }

        /* =========================================
           CARRUSEL DE ÁLBUMES 3D (COVER FLOW)
           ========================================= */
        .carousel-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 55vh;
            position: relative;
            z-index: 10;
        }

        .nav-arrow {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 3rem;
            cursor: pointer;
            padding: 20px;
            z-index: 20;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            position: absolute;
        }
        #prevBtn { left: 5%; }
        #nextBtn { right: 5%; }

        .nav-arrow:hover {
            color: white;
            text-shadow: 0 0 20px var(--vz-violet-glow);
            transform: scale(1.2);
        }

        /* Contenedor con Perspectiva 3D */
        .carousel-track-container {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px; /* Da la profundidad al 3D */
        }

        .carousel-track {
            position: relative;
            width: 300px; /* Ancho base de una tarjeta */
            height: 420px; /* Alto base de una tarjeta */
            transform-style: preserve-3d;
        }

        .album-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 5, 20, 0.9);
            border: 2px solid rgba(108, 75, 255, 0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transform-origin: center center;
            /* La transición fluida es clave para el efecto */
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        opacity 0.6s ease, 
                        filter 0.6s ease, 
                        border-color 0.6s ease, 
                        box-shadow 0.6s ease;
        }

        .album-card.active {
            border-color: var(--vz-violet);
            box-shadow: 0 0 40px var(--vz-violet-glow);
        }

        .album-cover {
            width: 100%;
            height: 75%;
            background: #2a2a35; /* Color temporal */
            object-fit: cover;
        }

        .album-info {
            height: 25%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(108, 75, 255, 0.3);
            background: linear-gradient(to top, rgba(108, 75, 255, 0.1), transparent);
        }

        .album-info h3 {
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: white;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .album-info p {
            font-size: 0.75rem;
            color: var(--vz-violet);
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            header { flex-direction: column-reverse; gap: 20px; }
            .page-title { font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 20px;}
            .floating-contact { bottom: 65px; right: 15px; gap: 12px; }
            .contact-icon { width: 55px; height: 55px; }
            
            /* Tamaños ajustados para móvil */
            .carousel-track { width: 220px; height: 320px; }
            .nav-arrow { font-size: 2.5rem; padding: 10px; }
            #prevBtn { left: 2%; }
            #nextBtn { right: 2%; }
        }
    </style>
</head>
<body>
    
    <video autoplay muted loop playsinline class="bg-image">
        <source src="VIDEO/webbg.mp4" type="video/mp4">
    </video>
    <div class="ambient-bg"></div>

    <div class="floating-contact" id="contactButtons">
        <a href="https://wa.me/56932751639" target="_blank" class="contact-icon" title="WhatsApp"><img src="ICON/social.png" alt="WhatsApp"></a>
        <a href="mailto:contacto.veconzeta@gmail.com" class="contact-icon" title="Email"><img src="ICON/gmail.png" alt="Email"></a>
    </div>

    <header>
        <a href="index.html" class="back-btn">[ < VOLVER AL INICIO ]</a>
        <div>SYS.VECONZETA // FOTOGRAFIA.01</div>
    </header>

    <h1 class="page-title">FOTOGRAFÍA</h1>

    <div class="carousel-wrapper">
        <button class="nav-arrow" id="prevBtn">&#10094;</button>
        
        <div class="carousel-track-container">
            <div class="carousel-track" id="track">
                
                <div class="album-card">
                    <img src="" class="album-cover" alt="">
                    <div class="album-info">
                        <h3>ÁLBUM 01</h3>
                        <p>Retratos</p>
                    </div>
                </div>

                <div class="album-card">
                    <img src="" class="album-cover" alt="">
                    <div class="album-info">
                        <h3>ÁLBUM 02</h3>
                        <p>Cosplay</p>
                    </div>
                </div>

                <div class="album-card">
                    <img src="" class="album-cover" alt="">
                    <div class="album-info">
                        <h3>ÁLBUM 03</h3>
                        <p>Eventos</p>
                    </div>
                </div>
                
                <div class="album-card">
                    <img src="" class="album-cover" alt="">
                    <div class="album-info">
                        <h3>ÁLBUM 04</h3>
                        <p>Productos</p>
                    </div>
                </div>

            </div>
        </div>

        <button class="nav-arrow" id="nextBtn">&#10095;</button>
    </div>

    <script>
        const track = document.getElementById('track');
        const cards = Array.from(track.querySelectorAll('.album-card'));
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        
        let currentIndex = 0;

        function updateCarousel() {
            const isMobile = window.innerWidth <= 768;
            // Configuración de distancias (X = Lados, Z = Profundidad)
            const xOffset = isMobile ? 120 : 250; // Cuánto se separan a los lados
            const zOffset = isMobile ? -80 : -100; // Cuánto se hunden hacia el fondo
            const rotation = isMobile ? 15 : 25; // Grados que giran mirando al centro

            cards.forEach((card, index) => {
                // Matemáticas: ¿A cuántos lugares de distancia está esta tarjeta del centro?
                let offset = index - currentIndex; 
                let direction = offset > 0 ? 1 : -1; // 1 = Derecha, -1 = Izquierda
                let distance = Math.abs(offset);

                if (offset === 0) {
                    // EL REY DEL CENTRO
                    card.style.transform = `translateX(0px) translateZ(50px) rotateY(0deg) scale(1.15)`;
                    card.style.zIndex = 100;
                    card.style.opacity = 1;
                    card.style.filter = 'none';
                    card.classList.add('active');
                } else {
                    // LOS VASALLOS A LOS LADOS
                    // Se multiplican por su distancia para irse más y más lejos
                    let moveX = direction * (xOffset + (distance * (xOffset * 0.4))); 
                    let moveZ = zOffset * distance;
                    let rotateY = direction * -rotation; // Giran mirando hacia el centro
                    
                    card.style.transform = `translateX(${moveX}px) translateZ(${moveZ}px) rotateY(${rotateY}deg) scale(0.85)`;
                    card.style.zIndex = 50 - distance; // Mientras más lejos, más bajo el z-index
                    card.style.opacity = Math.max(1 - (distance * 0.3), 0); // Se van haciendo transparentes
                    card.style.filter = `blur(${distance * 2}px)`; // Se desenfocan
                    card.classList.remove('active');
                }
            });
        }

        // Flechas
        nextBtn.addEventListener('click', () => {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                updateCarousel();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateCarousel();
            }
        });

        // Click en tarjetas laterales
        cards.forEach((card, index) => {
            card.addEventListener('click', () => {
                if (currentIndex !== index) {
                    // Si tocas uno lateral, viaja al centro
                    currentIndex = index;
                    updateCarousel();
                } else {
                    // Si tocas el del centro, ABRIMOS EL ÁLBUM (Próximo paso)
                    console.log("¡ÁLBUM " + (index + 1) + " SE ABRE AQUÍ!");
                }
            });
        });

        // Reposicionar al cambiar tamaño de pantalla
        window.addEventListener('resize', updateCarousel);

        // Inicializar
        updateCarousel();
    </script>
</body>
</html>
