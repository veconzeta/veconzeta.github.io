<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veconzeta | Fotografía</title>
    <style>
        :root {
            --vz-violet: #6C4BFF;
            --vz-violet-glow: rgba(108, 75, 255, 0.7);
            --bg-dark: #05030A;
            --text-main: #E0E0E0;
            --text-muted: #888899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
        }

        body.no-scroll { overflow: hidden; }
        body.gallery-open .floating-contact { display: none !important; }

        /* --- VIDEO DE FONDO FIJO --- */
        .bg-image { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: -2; 
        }

        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(5, 3, 10, 0.5) 0%, rgba(5, 3, 10, 0.95) 100%);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            z-index: -1;
        }

        /* --- HEADER Y NAVEGACIÓN --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 5% 20px; font-family: 'Courier New', monospace;
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted); z-index: 5;
        }

        .back-btn {
            color: white; text-decoration: none; border: 1px solid var(--vz-violet);
            padding: 8px 15px; border-radius: 5px; background: rgba(108, 75, 255, 0.1);
            transition: all 0.3s ease; cursor: pointer; display: inline-block;
        }
        .back-btn:hover { background: rgba(108, 75, 255, 0.3); box-shadow: 0 0 15px var(--vz-violet-glow); }

        .page-title {
            text-align: center; margin: 10px 0 30px; font-family: 'Courier New', monospace;
            font-size: 2.5rem; letter-spacing: 8px; color: white;
            text-shadow: 0 0 20px var(--vz-violet-glow); z-index: 5;
        }

        .floating-contact {
            position: fixed; bottom: 80px; right: 25px;
            display: flex; flex-direction: column; gap: 15px; z-index: 1500;
        }

        .contact-icon {
            width: 60px; height: 60px; background: rgba(5, 3, 10, 0.9);
            border: 1px solid var(--vz-violet); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.4s ease; backdrop-filter: blur(5px); padding: 12px;
        }
        .contact-icon img { width: 100%; height: 100%; object-fit: contain; }

        /* --- CARRUSEL 3D (REPARADO A 16:9 PURO) --- */
        .carousel-wrapper {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 50vh; position: relative; z-index: 10;
        }
        .nav-arrow {
            background: none; border: none; color: rgba(255, 255, 255, 0.5);
            font-size: 3rem; cursor: pointer; padding: 20px; z-index: 20;
            transition: all 0.3s ease;
        }
        .carousel-track-container { width: 100%; max-width: 1400px; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; perspective: 1200px; }
        .carousel-track { position: relative; width: 600px; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .album-card {
            position: absolute; top: 0; left: 0; width: 100%; aspect-ratio: 16 / 9; 
            background: #000; border: 2px solid rgba(108, 75, 255, 0.2);
            border-radius: 8px; cursor: pointer; overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s ease, filter 0.6s ease, border-color 0.6s ease;
            display: flex; align-items: center; justify-content: center; /* Centrado flex */
        }
        
        /* ADAPTACIÓN AUTOMÁTICA DE VERTICALES A 16:9 */
        .album-cover { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .album-card.active { border-color: var(--vz-violet); box-shadow: 0 0 40px var(--vz-violet-glow); }

        /* --- NUEVO ESTILO DE INFORMACIÓN CENTRADA Y CON HALO --- */
        .album-info { 
            position: relative; 
            z-index: 2; /* Por encima de la foto */
            width: 90%; 
            text-align: center;
            pointer-events: none; /* Asegura clics pasen a la tarjeta */
            background: none; /* Eliminado degradado inferior */
            padding: 0;
        }
        
        .album-info h3 { 
            font-family: 'Courier New', monospace; 
            font-size: 1.8rem; /* Un poco más grande para ser protagonista */
            color: white; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            
            /* EFECTO NEÓN / HALO VIOLETA */
            text-shadow: 
                0 0 5px rgba(255, 255, 255, 0.8), /* Brillo blanco interno */
                0 0 10px var(--vz-violet),         /* Halo violeta medio */
                0 0 20px var(--vz-violet),         /* Halo violeta amplio */
                0 0 30px #6C4BFF;                  /* Halo violeta intenso de fondo */
        }

        /* --- GALERÍA COLLAGE --- */
        .gallery-overlay {
            position: fixed; top: 100vh; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 3, 10, 0.98); backdrop-filter: blur(20px);
            z-index: 2000; overflow-y: auto; overflow-x: hidden;
            transition: top 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column;
        }
        .gallery-overlay.open { top: 0; }
        .masonry-container { padding: 40px 5%; column-count: 4; column-gap: 20px; }
        .masonry-item { margin-bottom: 20px; break-inside: avoid; border-radius: 4px; overflow: hidden; border: 1px solid rgba(108, 75, 255, 0.1); cursor: pointer; }
        .masonry-item img { width: 100%; display: block; }

        /* --- LIGHTBOX --- */
        .lightbox-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 3000; display: flex;
            justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .lightbox-overlay.open { opacity: 1; pointer-events: all; }
        .lightbox-img { max-width: 90vw; max-height: 90vh; object-fit: contain; }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; text-align: center; }
            .page-title { font-size: 1.5rem; letter-spacing: 4px; }
            .carousel-track { width: 85vw; }
            .masonry-container { column-count: 2; column-gap: 10px; }
            .album-info h3 { font-size: 1.2rem; letter-spacing: 2px; } /* Ajuste móvil */
        }
    </style>
</head>
<body id="mainBody">
    <video autoplay muted loop playsinline class="bg-image"><source src="VIDEO/webbg.mp4" type="video/mp4"></video>
    <div class="ambient-bg"></div>

    <div class="floating-contact" id="contactButtons">
        <a href="https://wa.me/56932751639" target="_blank" class="contact-icon" title="WhatsApp"><img src="ICON/social.png" alt="WhatsApp"></a>
        <a href="mailto:contacto.veconzeta@gmail.com" class="contact-icon" title="Email"><img src="ICON/gmail.png" alt="Email"></a>
    </div>

    <header>
        <a href="index.html" class="back-btn">[ < VOLVER AL INICIO ]</a>
        <div>SYS.VECONZETA // FOTOGRAFIA.01</div>
    </header>

    <h1 class="page-title">FOTOGRAFÍA</h1>

    <div class="carousel-wrapper">
        <button class="nav-arrow" id="prevBtn" style="position: absolute; left: 2%; z-index: 20;">&#10094;</button>
        <div class="carousel-track-container">
            <div class="carousel-track" id="track">
                </div>
        </div>
        <button class="nav-arrow" id="nextBtn" style="position: absolute; right: 2%; z-index: 20;">&#10095;</button>
    </div>

    <div class="gallery-overlay" id="galleryOverlay">
        <div style="padding: 20px 5%; display: flex; justify-content: space-between; position: sticky; top: 0; background: #05030A; z-index: 10;">
            <h2 id="galleryTitle">ÁLBUM</h2>
            <button class="back-btn" onclick="closeGallery()">[ CERRAR ÁLBUM ]</button>
        </div>
        <div class="masonry-container" id="masonryContainer"></div>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay">
        <button onclick="closeLightbox()" style="position: absolute; top: 20px; right: 20px; color: white; background: none; border: none; font-size: 3rem; cursor: pointer;">&times;</button>
        <img src="" id="lightboxImage" class="lightbox-img">
    </div>

    <script>
        // ==============================================================
        // --- DATA AUTOMATIZADA CORREGIDA SEGÚN TUS RANGOS ---
        // ==============================================================
        const ROOT = "PORTAFOLIO_FOTOGRAFIAS";

        const albumData = {
            // Eventos: EVENTOS_1.jpg a EVENTOS_51.jpg
            0: Array.from({length: 51}, (_, i) => `${ROOT}/01_EVENTOS/EVENTOS_${i + 1}.jpg`),
            
            // Sesiones: SESIONES_1.jpg a SESIONES_12.jpg
            1: Array.from({length: 12}, (_, i) => `${ROOT}/02_SESIONES_Y_RETRATOS/SESIONES_${i + 1}.jpg`),
            
            // Producto: PRODUCTO_1.jpg a PRODUCTO_22.jpg
            2: Array.from({length: 22}, (_, i) => `${ROOT}/03_PRODUCTO/PRODUCTO_${i + 1}.jpg`),
            
            // Cosplayers: COSPLAYER_1.jpg a COSPLAYER_34.jpg
            3: Array.from({length: 34}, (_, i) => `${ROOT}/04_COSPLAYERS/COSPLAYER_${i + 1}.jpg`)
        };

        const albumTitles = ["EVENTOS SOCIALES", "SESIONES & RETRATOS", "FOTOGRAFÍA PRODUCTO", "COSPLAY & FICCIÓN"];

        // ==============================================================
        // --- LÓGICA DEL CARRUSEL ---
        // ==============================================================
        const track = document.getElementById('track');
        let currentIndex = 0;

        // Función para generar las tarjetas del carrusel dinámicamente y USAR LA FOTO Nº1 COMO PORTADA
        function generateCarouselCards() {
            albumTitles.forEach((title, i) => {
                // Obtener la URL de la primera imagen (imagen nº1)
                const coverUrl = albumData[i][0];

                // Crear la estructura HTML dinámicamente
                const card = document.createElement('div');
                card.className = 'album-card';

                const img = document.createElement('img');
                img.src = coverUrl; // <--- USAMOS LA FOTO Nº1 AQUÍ
                img.className = 'album-cover';
                img.alt = title;

                // FALLBACK: Si la foto nº1 no existe, nos dirá por qué en la consola (F12)
                img.onerror = () => { console.error("URL fallida en portada:", coverUrl); };

                const info = document.createElement('div');
                info.className = 'album-info';
                const h3 = document.createElement('h3');
                h3.innerText = title;
                info.appendChild(h3);

                card.appendChild(img);
                card.appendChild(info);
                track.appendChild(card);
            });
        }

        // Llamar a la función para poblar el carrusel antes de calcular su movimiento
        generateCarouselCards();

        // Redefinir las tarjetas después de crearlas dinámicamente
        const cards = Array.from(track.querySelectorAll('.album-card'));
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        function updateCarousel() {
            const isMobile = window.innerWidth <= 768;
            const xOff = isMobile ? 220 : 500; 
            cards.forEach((card, i) => {
                let off = i - currentIndex;
                let dist = Math.abs(off);
                if (off === 0) {
                    card.style.transform = `translateX(0) translateZ(50px) scale(1.1)`;
                    card.style.zIndex = 100; card.style.opacity = 1;
                    card.classList.add('active');
                } else {
                    card.style.transform = `translateX(${off * xOff}px) translateZ(-200px) scale(0.8) rotateY(${off * -20}deg)`;
                    card.style.zIndex = 50 - dist; card.style.opacity = 0.4;
                    card.classList.remove('active');
                }
            });
        }

        nextBtn.onclick = () => { if(currentIndex < cards.length-1) { currentIndex++; updateCarousel(); } };
        prevBtn.onclick = () => { if(currentIndex > 0) { currentIndex--; updateCarousel(); } };
        
        // Asignar clics a las tarjetas generadas dinámicamente
        cards.forEach((card, i) => card.onclick = () => currentIndex === i ? openGallery(i) : (currentIndex=i, updateCarousel()));

        // ==============================================================
        // --- LÓGICA DE GALERÍA Y LIGHTBOX ---
        // ==============================================================
        const galleryOverlay = document.getElementById('galleryOverlay');
        const masonryContainer = document.getElementById('masonryContainer');
        const galleryTitle = document.getElementById('galleryTitle');
        const body = document.getElementById('mainBody');

        function openGallery(idx) {
            const photos = albumData[idx];
            galleryTitle.innerText = albumTitles[idx];
            masonryContainer.innerHTML = ''; 

            if (photos && photos.length > 0) {
                photos.forEach((url) => {
                    const item = document.createElement('div');
                    item.className = 'masonry-item';
                    const img = document.createElement('img');
                    img.src = url;
                    img.loading = "lazy"; 
                    // FALLBACK: Si una imagen falla, ocultamos el cuadro
                    img.onerror = () => { item.style.display = 'none'; };
                    item.onclick = () => openLightbox(url); 
                    item.appendChild(img);
                    masonryContainer.appendChild(item);
                });
            }
            galleryOverlay.classList.add('open');
            body.classList.add('no-scroll');
        }

        function closeGallery() { 
            galleryOverlay.classList.remove('open'); 
            body.classList.remove('no-scroll');
        }

        function openLightbox(url) { 
            document.getElementById('lightboxImage').src = url;
            document.getElementById('lightboxOverlay').classList.add('open'); 
        }
        function closeLightbox() { document.getElementById('lightboxOverlay').classList.remove('open'); }

        updateCarousel();
        window.onresize = updateCarousel;
    </script>
</body>
</html>
