<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veconzeta | Diseño Gráfico</title>
    <style>
        :root {
            --vz-violet: #6C4BFF;
            --vz-violet-glow: rgba(108, 75, 255, 0.7);
            --bg-dark: #05030A;
            --text-main: #E0E0E0;
            --text-muted: #888899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden; /* Permite scroll vertical para la galería */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
        }

        /* --- PROTECCIÓN DE ACTIVOS --- */
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        img, video { -webkit-user-drag: none; -khtml-user-drag: none; -moz-user-drag: none; -o-user-drag: none; }

        /* --- FONDO --- */
        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(5, 3, 10, 0.4) 0%, rgba(5, 3, 10, 0.95) 100%);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: -1;
        }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 5% 10px; font-family: 'Courier New', monospace;
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted); z-index: 50; position: relative;
        }
        .back-btn {
            color: white; text-decoration: none; border: 1px solid var(--vz-violet);
            padding: 8px 15px; border-radius: 5px; background: rgba(108, 75, 255, 0.1);
            transition: all 0.3s ease; cursor: pointer; z-index: 50;
        }
        .back-btn:hover { background: rgba(108, 75, 255, 0.3); box-shadow: 0 0 15px var(--vz-violet-glow); }
        
        .page-header-container { text-align: left; padding: 20px 5% 40px; max-width: 1600px; margin: 0 auto; width: 100%; z-index: 5; position: relative; }
        .page-subtitle { font-family: 'Inter', sans-serif; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        .page-title { font-family: 'Courier New', monospace; font-size: 2rem; letter-spacing: 8px; color: white; text-shadow: 0 0 15px var(--vz-violet-glow); margin: 0; }

        /* --- CONTACTO FLOTANTE --- */
        .floating-contact { position: fixed; bottom: 80px; right: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 1500; }
        .contact-icon { width: 60px; height: 60px; background: rgba(5, 3, 10, 0.9); border: 1px solid var(--vz-violet); border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 12px; transition: all 0.3s ease;}
        .contact-icon:hover { box-shadow: 0 0 20px var(--vz-violet-glow); transform: scale(1.1); }
        .contact-icon img { width: 100%; height: 100%; object-fit: contain; }

        /* ==================================================================
           GRILLA DE DISEÑO (BASE)
        ================================================================== */
        .design-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            padding: 0 5% 100px; /* Padding inferior para que no tape el contacto */
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            z-index: 10;
            position: relative;
        }

        .design-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(108, 75, 255, 0.2);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            background: #000;
            aspect-ratio: 4/5; /* Formato estándar, podemos cambiarlo luego */
        }

        .design-item:hover {
            border-color: var(--vz-violet);
            box-shadow: 0 0 30px rgba(108, 75, 255, 0.3);
            transform: translateY(-10px);
            z-index: 2;
        }

        .design-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, filter 0.5s ease;
            filter: grayscale(30%) brightness(0.8);
        }

        .design-item:hover .design-img {
            transform: scale(1.05);
            filter: grayscale(0%) brightness(1);
        }

        .design-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 40px 20px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .design-item:hover .design-overlay {
            opacity: 1;
        }

        .design-title {
            font-family: 'Arial Black', sans-serif;
            color: white;
            font-size: 1.2rem;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .design-category {
            font-family: 'Courier New', monospace;
            color: var(--vz-violet);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- RESPONSIVO --- */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 10px; padding: 20px 5% 10px; align-items: flex-start; }
            .page-title { font-size: 1.5rem; letter-spacing: 4px; }
            .design-gallery { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
            .floating-contact { bottom: 65px; right: 15px; gap: 12px; }
            .contact-icon { width: 50px; height: 50px; }
            
            /* En móvil mostramos siempre los textos porque no hay "hover" natural */
            .design-overlay { opacity: 1; padding: 30px 15px 15px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 100%);}
            .design-img { filter: grayscale(0%) brightness(0.9); }
        }
    </style>
</head>
<body id="mainBody">

        <div class="design-item">

    <script>
        // --- SISTEMA DE PROTECCIÓN DE ACTIVOS ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => { 
            if (e.target.nodeName.toUpperCase() === 'IMG' || e.target.nodeName.toUpperCase() === 'VIDEO') e.preventDefault(); 
        });
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && ['s','u','p'].includes(e.key.toLowerCase())) e.preventDefault();
        });
    </script>
</body>
</html>
