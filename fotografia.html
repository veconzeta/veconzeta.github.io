<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veconzeta | Fotografía</title>
    <style>
        :root {
            --vz-violet: #6C4BFF;
            --vz-violet-glow: rgba(108, 75, 255, 0.7);
            --bg-dark: #05030A;
            --text-main: #E0E0E0;
            --text-muted: #888899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            /* A diferencia del index, aquí sí permitimos scroll vertical */
            overflow-x: hidden; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
        }

        /* --- VIDEO DE FONDO FIJO --- */
        .bg-image { 
            position: fixed; /* Fixed para que no se mueva al hacer scroll */
            top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: -2; 
        }

        .ambient-bg {
            position: fixed; /* Fixed para que el filtro oscurecido acompañe al scroll */
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(5, 3, 10, 0.5) 0%, rgba(5, 3, 10, 0.95) 100%);
            backdrop-filter: blur(5px); 
            -webkit-backdrop-filter: blur(5px);
            z-index: -1;
        }

        /* --- HEADER Y NAVEGACIÓN --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 5% 20px; font-family: 'Courier New', monospace;
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted); z-index: 5;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            border: 1px solid var(--vz-violet);
            padding: 8px 15px;
            border-radius: 5px;
            background: rgba(108, 75, 255, 0.1);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(108, 75, 255, 0.3);
            box-shadow: 0 0 15px var(--vz-violet-glow);
        }

        .page-title {
            text-align: center;
            margin: 40px 0 20px;
            font-family: 'Courier New', monospace;
            font-size: 2.5rem;
            letter-spacing: 8px;
            color: white;
            text-shadow: 0 0 20px var(--vz-violet-glow);
            z-index: 5;
        }

        /* --- RESPONSIVE BÁSICO --- */
        @media (max-width: 768px) {
            header { 
                flex-direction: column-reverse; 
                gap: 20px;
            }
            .page-title { 
                font-size: 1.8rem; 
                letter-spacing: 4px; 
            }
        }
    </style>
</head>
<body>
    
    <video autoplay muted loop playsinline class="bg-image">
        <source src="VIDEO/webbg.mp4" type="video/mp4">
    </video>
    <div class="ambient-bg"></div>

    <header>
        <a href="index.html" class="back-btn">[ < VOLVER AL INICIO ]</a>
        <div>SYS.VECONZETA // MÓDULO.01</div>
    </header>

    <h1 class="page-title">FOTOGRAFÍA</h1>

    </body>
</html>
