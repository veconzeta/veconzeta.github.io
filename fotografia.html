<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veconzeta | Fotografía</title>
    <style>
        :root {
            --vz-violet: #6C4BFF;
            --vz-violet-glow: rgba(108, 75, 255, 0.7);
            --bg-dark: #05030A;
            --text-main: #E0E0E0;
            --text-muted: #888899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
        }

        body.no-scroll { overflow: hidden; }
        body.gallery-open .floating-contact { display: none !important; }

        /* --- FONDO --- */
        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(5, 3, 10, 0.5) 0%, rgba(5, 3, 10, 0.95) 100%);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); z-index: -1;
        }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 5% 20px; font-family: 'Courier New', monospace;
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted); z-index: 5;
        }

        .back-btn {
            color: white; text-decoration: none; border: 1px solid var(--vz-violet);
            padding: 8px 15px; border-radius: 5px; background: rgba(108, 75, 255, 0.1);
            transition: all 0.3s ease; cursor: pointer; display: inline-block;
        }
        .back-btn:hover { background: rgba(108, 75, 255, 0.3); box-shadow: 0 0 15px var(--vz-violet-glow); }

        .page-title {
            text-align: center; margin: 10px 0 30px; font-family: 'Courier New', monospace;
            font-size: 2.5rem; letter-spacing: 8px; color: white;
            text-shadow: 0 0 20px var(--vz-violet-glow); z-index: 5;
        }

        /* --- CARRUSEL 16:9 --- */
        .carousel-wrapper {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 50vh; position: relative; z-index: 10;
        }
        .nav-arrow {
            background: none; border: none; color: rgba(255, 255, 255, 0.5);
            font-size: 3rem; cursor: pointer; padding: 20px; z-index: 20;
            transition: all 0.3s ease;
        }
        .carousel-track-container { width: 100%; max-width: 1400px; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; perspective: 1200px; }
        .carousel-track { position: relative; width: 600px; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .album-card {
            position: absolute; top: 0; left: 0; width: 100%; aspect-ratio: 16 / 9; 
            background: #000; border: 2px solid rgba(108, 75, 255, 0.2);
            border-radius: 8px; cursor: pointer; overflow: hidden;
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .album-card.active { border-color: var(--vz-violet); box-shadow: 0 0 40px var(--vz-violet-glow); }
        .album-cover { width: 100%; height: 100%; object-fit: cover; }
        .album-info { 
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }
        .album-info h3 { font-family: 'Courier New', monospace; font-size: 1.2rem; }

        /* --- GALERÍA --- */
        .gallery-overlay {
            position: fixed; top: 100vh; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 3, 10, 0.98); backdrop-filter: blur(20px);
            z-index: 2000; overflow-y: auto; transition: top 0.5s ease;
        }
        .gallery-overlay.open { top: 0; }
        .masonry-container { padding: 40px 5%; column-count: 4; column-gap: 20px; }
        .masonry-item { margin-bottom: 20px; break-inside: avoid; border-radius: 4px; overflow: hidden; border: 1px solid rgba(108, 75, 255, 0.1); cursor: pointer; }
        .masonry-item img { width: 100%; display: block; }

        /* --- LIGHTBOX --- */
        .lightbox-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 3000; display: flex;
            justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .lightbox-overlay.open { opacity: 1; pointer-events: all; }
        .lightbox-img { max-width: 90vw; max-height: 90vh; object-fit: contain; }

        @media (max-width: 768px) {
            .page-title { font-size: 1.5rem; }
            .carousel-track { width: 85vw; }
            .masonry-container { column-count: 2; }
        }
    </style>
</head>
<body id="mainBody">
    <video autoplay muted loop playsinline class="bg-image"><source src="VIDEO/webbg.mp4" type="video/mp4"></video>
    <div class="ambient-bg"></div>

    <header>
        <a href="index.html" class="back-btn">[ < VOLVER AL INICIO ]</a>
        <div>SYS.VECONZETA // FOTOGRAFIA.01</div>
    </header>

    <h1 class="page-title">FOTOGRAFÍA</h1>

    <div class="carousel-wrapper">
        <button class="nav-arrow" id="prevBtn">&#10094;</button>
        <div class="carousel-track-container">
            <div class="carousel-track" id="track">
                <div class="album-card"><img src="PORTAFOLIO_FOTOGRAFIAS/01_EVENTOS/portada.jpg" class="album-cover"><div class="album-info"><h3>ÁLBUM 01 - EVENTOS</h3></div></div>
                <div class="album-card"><img src="PORTAFOLIO_FOTOGRAFIAS/02_SESIONES_Y_RETRATOS/portada.jpg" class="album-cover"><div class="album-info"><h3>ÁLBUM 02 - SESIONES</h3></div></div>
                <div class="album-card"><img src="PORTAFOLIO_FOTOGRAFIAS/03_PRODUCTO/portada.jpg" class="album-cover"><div class="album-info"><h3>ÁLBUM 03 - PRODUCTO</h3></div></div>
                <div class="album-card"><img src="PORTAFOLIO_FOTOGRAFIAS/04_COSPLAYERS/portada.jpg" class="album-cover"><div class="album-info"><h3>ÁLBUM 04 - COSPLAY</h3></div></div>
            </div>
        </div>
        <button class="nav-arrow" id="nextBtn">&#10095;</button>
    </div>

    <div class="gallery-overlay" id="galleryOverlay">
        <div style="padding: 20px 5%; display: flex; justify-content: space-between; position: sticky; top: 0; background: #05030A; z-index: 10;">
            <h2 id="galleryTitle">ÁLBUM</h2>
            <button class="back-btn" onclick="closeGallery()">[ CERRAR ÁLBUM ]</button>
        </div>
        <div class="masonry-container" id="masonryContainer"></div>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay">
        <button onclick="closeLightbox()" style="position: absolute; top: 20px; right: 20px; color: white; background: none; border: none; font-size: 2.5rem; cursor: pointer;">&times;</button>
        <img src="" id="lightboxImage" class="lightbox-img">
    </div>

    <script>
        // --- BASE DE DATOS AUTOMATIZADA ---
        const albumData = {
            0: Array.from({length: 49}, (_, i) => `PORTAFOLIO_FOTOGRAFIAS/01_EVENTOS/EVENTOS-${i + 1}.jpg`),
            1: Array.from({length: 13}, (_, i) => `PORTAFOLIO_FOTOGRAFIAS/02_SESIONES_Y_RETRATOS/SESIONES-${i + 1}.jpg`),
            2: Array.from({length: 22}, (_, i) => {
                const n = i + 6;
                const f = n >= 17 ? n + 1 : n;
                return `PORTAFOLIO_FOTOGRAFIAS/03_PRODUCTO/PRODUCTO-${f}.jpg`;
            }),
            3: Array.from({length: 34}, (_, i) => `PORTAFOLIO_FOTOGRAFIAS/04_COSPLAYERS/RETRATO-${i + 1}.jpg`)
        };

        const albumTitles = ["EVENTOS SOCIALES", "SESIONES & RETRATOS", "FOTOGRAFÍA PRODUCTO", "COSPLAY & FICCIÓN"];

        // --- LÓGICA DEL CARRUSEL ---
        const track = document.getElementById('track');
        const cards = Array.from(track.querySelectorAll('.album-card'));
        let currentIndex = 0;

        function updateCarousel() {
            const isMobile = window.innerWidth <= 768;
            const xOff = isMobile ? 220 : 500; 
            cards.forEach((card, i) => {
                let off = i - currentIndex;
                if (off === 0) {
                    card.style.transform = `translateX(0) translateZ(50px) scale(1.1)`;
                    card.style.zIndex = 100; card.style.opacity = 1;
                    card.classList.add('active');
                } else {
                    card.style.transform = `translateX(${off * xOff}px) translateZ(-200px) scale(0.8) rotateY(${off * -20}deg)`;
                    card.style.zIndex = 50 - Math.abs(off); card.style.opacity = 0.4;
                    card.classList.remove('active');
                }
            });
        }

        document.getElementById('nextBtn').onclick = () => { if(currentIndex < cards.length-1) { currentIndex++; updateCarousel(); } };
        document.getElementById('prevBtn').onclick = () => { if(currentIndex > 0) { currentIndex--; updateCarousel(); } };
        
        cards.forEach((card, i) => card.onclick = () => currentIndex === i ? openGallery(i) : (currentIndex=i, updateCarousel()));

        // --- GALERÍA ---
        function openGallery(idx) {
            const container = document.getElementById('masonryContainer');
            document.getElementById('galleryTitle').innerText = albumTitles[idx];
            container.innerHTML = '';
            
            albumData[idx].forEach((url, imgIdx) => {
                const item = document.createElement('div');
                item.className = 'masonry-item';
                const img = document.createElement('img');
                img.src = url;
                // FALLBACK: Si la imagen falla, ocultamos el contenedor
                img.onerror = () => item.style.display = 'none';
                item.onclick = () => openLightbox(url);
                item.appendChild(img);
                container.appendChild(item);
            });
            document.getElementById('galleryOverlay').classList.add('open');
            document.body.classList.add('no-scroll');
        }

        function closeGallery() { 
            document.getElementById('galleryOverlay').classList.remove('open'); 
            document.body.classList.remove('no-scroll');
        }

        function openLightbox(url) { 
            document.getElementById('lightboxImage').src = url;
            document.getElementById('lightboxOverlay').classList.add('open'); 
        }
        function closeLightbox() { document.getElementById('lightboxOverlay').classList.remove('open'); }

        updateCarousel();
        window.onresize = updateCarousel;
    </script>
</body>
</html>
