<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECONZETA | Narrativa Visual</title>
    <style>
        /* Estética Cinematográfica Base */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', 'Helvetica', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .hero {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: 15px;
            margin: 0;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .line {
            width: 50px;
            height: 1px;
            background-color: #444;
            margin: 20px auto;
        }

        p {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: #666;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Veconzeta</h1>
        <div class="line"></div>
        <p>Próximamente: Narrativa Visual & Fotomontaje</p>
    </div>

</body>
</html>
