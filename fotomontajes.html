<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veconzeta | Fotomontajes</title>
    <style>
        :root {
            --vz-violet: #6C4BFF;
            --vz-violet-glow: rgba(108, 75, 255, 0.7);
            --bg-dark: #05030A;
            --text-main: #E0E0E0;
            --text-muted: #888899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100svh;
            width: 100vw;
        }

        /* --- PROTECCIÓN DE ACTIVOS CSS --- */
        body {
            -webkit-user-select: none; 
            -moz-user-select: none;    
            -ms-user-select: none;     
            user-select: none;         
        }

        img {
            -webkit-user-drag: none;   
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
        }

        body.no-scroll { overflow: hidden; }

        /* --- FONDO --- */
        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(5, 3, 10, 0.4) 0%, rgba(5, 3, 10, 0.95) 100%);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: -1;
        }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 5% 20px; font-family: 'Courier New', monospace;
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted); z-index: 50;
        }

        .back-btn {
            color: white; text-decoration: none; border: 1px solid var(--vz-violet);
            padding: 8px 15px; border-radius: 5px; background: rgba(108, 75, 255, 0.1);
            transition: all 0.3s ease; cursor: pointer;
        }
        .back-btn:hover { background: rgba(108, 75, 255, 0.3); box-shadow: 0 0 15px var(--vz-violet-glow); }

        .page-title {
            text-align: center; margin: 10px 0 30px; font-family: 'Courier New', monospace;
            font-size: 2.5rem; letter-spacing: 8px; color: white;
            text-shadow: 0 0 20px var(--vz-violet-glow); z-index: 5;
        }

        /* --- CARRUSEL ELEVADO --- */
        .carousel-wrapper {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 50vh; position: relative; z-index: 10;
            margin-top: -20vh;
        }

        .carousel-track-container { width: 100%; max-width: 1400px; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; perspective: 1200px; }
        .carousel-track { position: relative; width: 600px; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .album-card {
            position: absolute; top: 0; left: 0; width: 100%; aspect-ratio: 16 / 9; 
            background: #000; border: 2px solid rgba(108, 75, 255, 0.2);
            border-radius: 8px; overflow: hidden; /* Oculta todo lo que desborde */
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.6s, border-color 0.6s;
        }
        
        .album-card.active { border-color: var(--vz-violet); box-shadow: 0 0 40px var(--vz-violet-glow); }

        /* --- SISTEMA ANTES Y DESPUÉS (SLIDER) --- */
        .img-after, .img-before {
            width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0;
            pointer-events: none;
        }

        /* La capa de la imagen base que será revelada como máscara */
        .img-before-wrapper {
            position: absolute; top: 0; left: 0; width: 0%; height: 100%;
            overflow: hidden; z-index: 2;
        }

        /* Barra divisoria */
        .slider-line {
            position: absolute; top: 0; left: 0%; width: 2px; height: 100%;
            background: white; z-index: 3; pointer-events: none;
            box-shadow: 0 0 15px var(--vz-violet-glow);
        }

        /* Botón visual del slider */
        .slider-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 36px; height: 36px; background: rgba(5, 3, 10, 0.95);
            border: 2px solid var(--vz-violet); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .slider-button svg { width: 18px; height: 18px; color: white; stroke-width: 3; }

        /* Input nativo que controla todo (invisible pero clickable) */
        .ba-slider {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: ew-resize; z-index: 10; margin: 0;
            /* Soporte móvil */
            -webkit-appearance: none;
        }

        /* Ocultar elementos interactivos en montajes inactivos (para que no roben clics) */
        .album-card:not(.active) .ba-slider,
        .album-card:not(.active) .slider-line {
            display: none;
        }

        /* --- CAJA DE TEXTO --- */
        .album-info { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            padding: 50px 20px 20px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.5) 50%, transparent 75%);
            text-align: center; z-index: 5;
            pointer-events: none; /* Deja pasar el clic al slider */
        }
        .album-info h3 { 
            font-family: 'Courier New', monospace; font-size: 1.4rem; color: white; 
            letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 15px var(--vz-violet);
        }

        /* --- NAV ARROWS --- */
        .nav-arrow {
            background: none; border: none; color: white; cursor: pointer; padding: 20px; z-index: 999;
            position: absolute !important; top: 50% !important; 
            margin-top: 168.75px !important; transform: translateY(-50%) !important;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-arrow svg {
            width: 50px; height: 50px; stroke: currentColor; stroke-width: 5;
            stroke-linecap: round; stroke-linejoin: round; fill: none; transition: all 0.3s ease;
            filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.8));
        }
        #prevBtn { left: calc(50% - 400px); }
        #nextBtn { right: calc(50% - 400px); }
        .nav-arrow:hover svg { transform: scale(1.15); }

        /* --- CONTACTO --- */
        .floating-contact { position: fixed; bottom: 80px; right: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 1500; }
        .contact-icon { width: 60px; height: 60px; background: rgba(5, 3, 10, 0.9); border: 1px solid var(--vz-violet); border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 12px; }
        .contact-icon img { width: 100%; height: 100%; object-fit: contain; }

        /* --- LIGHTBOX --- */
        .lightbox-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 3000; display: flex;
            justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .lightbox-overlay.open { opacity: 1; pointer-events: all; }
        .lightbox-img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
        .close-lightbox-btn { position: absolute; top: 30px; right: 40px; color: white; font-family: 'Courier New', monospace; font-size: 1.2rem; background: none; border: none; cursor: pointer; z-index: 3010; }

        /* --- RESPONSIVO --- */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; }
            .page-title { font-size: 1.5rem; letter-spacing: 4px; }
            .carousel-wrapper { margin-top: -15vh; } 
            .carousel-track { width: 85vw; }
            
            .nav-arrow { display: flex !important; padding: 10px; margin-top: 23.9vw !important; }
            .nav-arrow svg { width: 35px; height: 35px; stroke-width: 4; }
            #prevBtn { left: 1%; } 
            #nextBtn { right: 1%; }
            .album-info h3 { font-size: 1rem; letter-spacing: 2px; }
            .slider-button { width: 28px; height: 28px; }
        }
    </style>
</head>
<body id="mainBody">
    <video autoplay muted loop playsinline class="bg-image" controlsList="nodownload" disablePictureInPicture oncontextmenu="return false;">
        <source src="VIDEO/webbg.mp4" type="video/mp4">
    </video>
    <div class="ambient-bg"></div>

    <div class="floating-contact">
        <a href="https://wa.me/56932751639" target="_blank" class="contact-icon"><img src="ICON/social.png" alt="WhatsApp"></a>
        <a href="mailto:contacto.veconzeta@gmail.com" class="contact-icon"><img src="ICON/gmail.png" alt="Email"></a>
    </div>

    <header>
        <a href="index.html" class="back-btn">[ < VOLVER AL INICIO ]</a>
        <div>SYS.VECONZETA // COMPOSITING_MODULE</div>
    </header>

    <h1 class="page-title">FOTOMONTAJES</h1>

    <div class="carousel-wrapper">
        <button class="nav-arrow" id="prevBtn">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="carousel-track-container">
            <div class="carousel-track" id="track"></div>
        </div>
        <button class="nav-arrow" id="nextBtn">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
        <button class="close-lightbox-btn">[ X ]</button>
        <img src="" id="lightboxImage" class="lightbox-img">
    </div>

    <script>
        // 1. CONFIGURACIÓN DE TUS FOTOMONTAJES
        // Asegúrate de tener las imágenes base (crudos) y final guardadas en tus carpetas.
        const ROOT = "PORTAFOLIO_FOTOMONTAJES";
        const montajesData = [
            { final: `${ROOT}/01_final.jpg`, base: `${ROOT}/01_base.jpg`, title: "COMPOSICIÓN ÉPICA" },
            { final: `${ROOT}/02_final.jpg`, base: `${ROOT}/02_base.jpg`, title: "MUNDO FANTASÍA" },
            { final: `${ROOT}/03_final.jpg`, base: `${ROOT}/03_base.jpg`, title: "PORTADA CYBERPUNK" },
            { final: `${ROOT}/04_final.jpg`, base: `${ROOT}/04_base.jpg`, title: "RETOQUE CINEMÁTICO" }
        ];

        const track = document.getElementById('track');
        let currentIndex = 0;

        function generateMontageCards() {
            montajesData.forEach((data, i) => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <img src="${data.final}" class="img-after" onerror="this.src='ICON/placeholder.jpg'">
                    
                    <div class="img-before-wrapper">
                        <img src="${data.base}" class="img-before" onerror="this.src='ICON/placeholder.jpg'">
                    </div>

                    <div class="slider-line">
                        <div class="slider-button">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg>
                        </div>
                    </div>

                    <input type="range" min="0" max="100" value="0" class="ba-slider">

                    <div class="album-info">
                        <h3 style="margin-bottom: 10px;">${data.title}</h3>
                        <button class="back-btn" onclick="openLightbox('${data.final}')" style="pointer-events: all; font-size: 0.7rem; padding: 5px 10px;">[ AMPLIAR FINAL ]</button>
                    </div>
                `;
                track.appendChild(card);
            });
            bindSliders();
        }

        generateMontageCards();

        const cards = Array.from(track.querySelectorAll('.album-card'));
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        function updateCarousel() {
            const isMobile = window.innerWidth <= 768;
            const xOff = isMobile ? 220 : 450; 
            cards.forEach((card, i) => {
                let off = i - currentIndex;
                let dist = Math.abs(off);
                if (off === 0) {
                    card.style.transform = `translateX(0) translateZ(100px) scale(1.15)`;
                    card.style.zIndex = 100; card.style.opacity = 1;
                    card.classList.add('active');
                } else {
                    card.style.transform = `translateX(${off * xOff}px) translateZ(-250px) scale(0.85) rotateY(${off * -15}deg)`;
                    card.style.zIndex = 50 - dist; card.style.opacity = 0.3;
                    card.classList.remove('active');
                    // Resetear el slider de la tarjeta inactiva
                    card.querySelector('.ba-slider').value = 0;
                    card.querySelector('.img-before-wrapper').style.width = '0%';
                    card.querySelector('.slider-line').style.left = '0%';
                }
            });
        }

        // --- LÓGICA DEL SLIDER ANTES/DESPUÉS ---
        function bindSliders() {
            document.querySelectorAll('.ba-slider').forEach(slider => {
                slider.addEventListener('input', (e) => {
                    const card = e.target.closest('.album-card');
                    const val = e.target.value;
                    // Ajusta el ancho de la capa base y mueve la línea separadora
                    card.querySelector('.img-before-wrapper').style.width = `${val}%`;
                    card.querySelector('.slider-line').style.left = `${val}%`;
                });

                // Evita que arrastrar el slider dispare el evento swipe del carrusel
                slider.addEventListener('touchstart', e => e.stopPropagation(), {passive: false});
                slider.addEventListener('touchmove', e => e.stopPropagation(), {passive: false});
                slider.addEventListener('touchend', e => e.stopPropagation(), {passive: false});
                slider.addEventListener('mousedown', e => e.stopPropagation());
            });
        }

        const goNext = () => { if(currentIndex < cards.length-1) { currentIndex++; updateCarousel(); } };
        const goPrev = () => { if(currentIndex > 0) { currentIndex--; updateCarousel(); } };

        nextBtn.onclick = (e) => { e.stopPropagation(); goNext(); };
        prevBtn.onclick = (e) => { e.stopPropagation(); goPrev(); };
        
        // Clic en tarjetas de atrás las trae al frente
        cards.forEach((card, i) => card.onclick = (e) => {
            if (currentIndex !== i) {
                currentIndex = i; 
                updateCarousel();
            }
        });

        // --- SOPORTE TÁCTIL PARA CARRUSEL (EXCEPTO SLIDER) ---
        let touchStartX = 0;
        let touchEndX = 0;

        track.addEventListener('touchstart', e => { 
            if (e.target.classList.contains('ba-slider')) return;
            touchStartX = e.changedTouches[0].screenX; 
        }, {passive: true});
        
        track.addEventListener('touchend', e => {
            if (e.target.classList.contains('ba-slider')) return;
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const swipeThreshold = 50; 
            if (touchEndX < touchStartX - swipeThreshold) goNext();
            if (touchEndX > touchStartX + swipeThreshold) goPrev();
        }

        // --- LIGHTBOX Y TECLADO ---
        function openLightbox(url) { 
            document.getElementById('lightboxImage').src = url;
            document.getElementById('lightboxOverlay').classList.add('open'); 
        }
        function closeLightbox() { document.getElementById('lightboxOverlay').classList.remove('open'); }

        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightboxOverlay');
            if (e.key === 'ArrowRight' && !lightbox.classList.contains('open')) goNext();
            if (e.key === 'ArrowLeft' && !lightbox.classList.contains('open')) goPrev();
            if (e.key === 'Escape') { closeLightbox(); }
        });

        // --- SISTEMA DE PROTECCIÓN ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => {
            if (e.target.nodeName.toUpperCase() === 'IMG' || e.target.nodeName.toUpperCase() === 'VIDEO') e.preventDefault();
        });
        document.addEventListener('keydown', e => {
            if (e.ctrlKey || e.metaKey) {
                const key = e.key.toLowerCase();
                if (key === 's' || key === 'u' || key === 'p') e.preventDefault();
            }
        });

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => { updateCarousel(); }, 150); 
        });

        updateCarousel(); 
    </script>
</body>
</html>
