<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veconzeta | Fotografía</title>
    <style>
        :root {
            --vz-violet: #6C4BFF;
            --vz-violet-glow: rgba(108, 75, 255, 0.7);
            --bg-dark: #05030A;
            --text-main: #E0E0E0;
            --text-muted: #888899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100svh;
            width: 100vw;
        }

        body.no-scroll { overflow: hidden; }
        body.gallery-open .floating-contact { display: none !important; }

        /* --- FONDO --- */
        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(5, 3, 10, 0.4) 0%, rgba(5, 3, 10, 0.95) 100%);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: -1;
        }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 5% 20px; font-family: 'Courier New', monospace;
            font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted); z-index: 50;
        }

        .back-btn {
            color: white; text-decoration: none; border: 1px solid var(--vz-violet);
            padding: 8px 15px; border-radius: 5px; background: rgba(108, 75, 255, 0.1);
            transition: all 0.3s ease; cursor: pointer;
        }

        .page-title {
            text-align: center; margin: 10px 0 30px; font-family: 'Courier New', monospace;
            font-size: 2.5rem; letter-spacing: 8px; color: white;
            text-shadow: 0 0 20px var(--vz-violet-glow); z-index: 5;
        }

        /* --- CARRUSEL ELEVADO --- */
        .carousel-wrapper {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 50vh; position: relative; z-index: 10;
            margin-top: -20vh; 
        }

        .carousel-track-container { width: 100%; max-width: 1400px; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; perspective: 1200px; }
        .carousel-track { position: relative; width: 600px; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .album-card {
            position: absolute; top: 0; left: 0; width: 100%; aspect-ratio: 16 / 9; 
            background: #000; border: 2px solid rgba(108, 75, 255, 0.2);
            border-radius: 8px; cursor: pointer; overflow: hidden;
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .album-cover { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .album-card.active { border-color: var(--vz-violet); box-shadow: 0 0 40px var(--vz-violet-glow); }

        /* --- NUEVA CAJA DE TEXTO CON DEGRADADO DE LEGIBILIDAD --- */
        .album-info { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            padding: 50px 20px 20px; /* Padding superior amplio para que el degradado respire */
            /* Degradado denso en la base para legibilidad total */
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.5) 50%, transparent 100%);
            text-align: center;
            z-index: 2;
            pointer-events: none;
        }

        .album-info h3 { 
            font-family: 'Courier New', monospace; 
            font-size: 1.4rem; 
            color: white; 
            letter-spacing: 3px;
            text-transform: uppercase;
            /* Resplandor violeta consistente con la marca */
            text-shadow: 0 0 15px var(--vz-violet);
        }

        /* --- NAV ARROWS --- */
        .nav-arrow {
            background: none; border: none; color: rgba(255, 255, 255, 0.3);
            font-size: 3rem; cursor: pointer; padding: 20px; z-index: 100;
            transition: 0.3s ease;
        }
        .nav-arrow:hover { color: white; transform: scale(1.1); }

        /* --- CONTACTO --- */
        .floating-contact { position: fixed; bottom: 80px; right: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 1500; }
        .contact-icon { width: 60px; height: 60px; background: rgba(5, 3, 10, 0.9); border: 1px solid var(--vz-violet); border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 12px; }
        .contact-icon img { width: 100%; height: 100%; object-fit: contain; }

        /* --- GALERÍA (OVERLAY) --- */
        .gallery-overlay {
            position: fixed; top: 100vh; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 3, 10, 0.98); backdrop-filter: blur(20px);
            z-index: 2000; overflow-y: auto; transition: top 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column;
        }
        .gallery-overlay.open { top: 0; }
        .masonry-container { padding: 40px 5%; column-count: 4; column-gap: 20px; }
        .masonry-item { margin-bottom: 20px; break-inside: avoid; border-radius: 4px; overflow: hidden; border: 1px solid rgba(108, 75, 255, 0.1); cursor: pointer; }
        .masonry-item img { width: 100%; display: block; }

        /* --- LIGHTBOX --- */
        .lightbox-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 3000; display: flex;
            justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .lightbox-overlay.open { opacity: 1; pointer-events: all; }
        .lightbox-img { max-width: 90vw; max-height: 90vh; object-fit: contain; }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; }
            .page-title { font-size: 1.5rem; letter-spacing: 4px; }
            .carousel-wrapper { margin-top: -5vh; }
            .carousel-track { width: 85vw; }
            .nav-arrow { display: none; }
            .masonry-container { column-count: 2; column-gap: 10px; }
            .album-info h3 { font-size: 1rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body id="mainBody">
    <video autoplay muted loop playsinline class="bg-image"><source src="VIDEO/webbg.mp4" type="video/mp4"></video>
    <div class="ambient-bg"></div>

    <div class="floating-contact">
        <a href="https://wa.me/56932751639" target="_blank" class="contact-icon"><img src="ICON/social.png" alt="WhatsApp"></a>
        <a href="mailto:contacto.veconzeta@gmail.com" class="contact-icon"><img src="ICON/gmail.png" alt="Email"></a>
    </div>

    <header>
        <a href="index.html" class="back-btn">[ VOLVER AL INICIO ]</a>
        <div>SYS.VECONZETA // PHOTOGRAPHY_MODULE</div>
    </header>

    <h1 class="page-title">FOTOGRAFÍA</h1>

    <div class="carousel-wrapper">
        <button class="nav-arrow" id="prevBtn" style="position: absolute; left: 2%;">&#10094;</button>
        <div class="carousel-track-container">
            <div class="carousel-track" id="track"></div>
        </div>
        <button class="nav-arrow" id="nextBtn" style="position: absolute; right: 2%;">&#10095;</button>
    </div>

    <div class="gallery-overlay" id="galleryOverlay">
        <div style="padding: 20px 5%; display: flex; justify-content: space-between; position: sticky; top: 0; background: #05030A; z-index: 10;">
            <h2 id="galleryTitle" style="font-family: 'Courier New', monospace; letter-spacing: 3px;">ÁLBUM</h2>
            <button class="back-btn" onclick="closeGallery()">[ X CERRAR ÁLBUM ]</button>
        </div>
        <div class="masonry-container" id="masonryContainer"></div>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
        <img src="" id="lightboxImage" class="lightbox-img">
    </div>

    <script>
        const ROOT = "PORTAFOLIO_FOTOGRAFIAS";
        const albumData = {
            0: Array.from({length: 51}, (_, i) => `${ROOT}/01_EVENTOS/EVENTOS_${i + 1}.jpg`),
            1: Array.from({length: 12}, (_, i) => `${ROOT}/02_SESIONES_Y_RETRATOS/SESIONES_${i + 1}.jpg`),
            2: Array.from({length: 22}, (_, i) => `${ROOT}/03_PRODUCTO/PRODUCTO_${i + 1}.jpg`),
            3: Array.from({length: 34}, (_, i) => `${ROOT}/04_COSPLAYERS/COSPLAYER_${i + 1}.jpg`)
        };

        // Nombres de categorías limpios
        const cardLabels = ["EVENTOS SOCIALES", "SESIONES & RETRATOS", "FOTOGRAFÍA PRODUCTO", "Cosplay & FICCIÓN"];
        // Títulos para la vista masonry
        const albumTitlesForGallery = ["EVENTOS SOCIALES", "SESIONES & RETRATOS", "FOTOGRAFÍA PRODUCTO", "COSPLAY & FICCIÓN"];

        const track = document.getElementById('track');
        let currentIndex = 0;

        function generateCarouselCards() {
            [0, 1, 2, 3].forEach((i) => {
                const coverUrl = albumData[i][0];
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <img src="${coverUrl}" class="album-cover" alt="${cardLabels[i]}" onerror="this.src='ICON/placeholder.jpg'">
                    <div class="album-info">
                        <h3>${cardLabels[i]}</h3>
                    </div>
                `;
                track.appendChild(card);
            });
        }

        generateCarouselCards();

        const cards = Array.from(track.querySelectorAll('.album-card'));
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        function updateCarousel() {
            const isMobile = window.innerWidth <= 768;
            const xOff = isMobile ? 220 : 450; 
            cards.forEach((card, i) => {
                let off = i - currentIndex;
                let dist = Math.abs(off);
                if (off === 0) {
                    card.style.transform = `translateX(0) translateZ(100px) scale(1.15)`;
                    card.style.zIndex = 100; card.style.opacity = 1;
                    card.classList.add('active');
                } else {
                    card.style.transform = `translateX(${off * xOff}px) translateZ(-250px) scale(0.85) rotateY(${off * -15}deg)`;
                    card.style.zIndex = 50 - dist; card.style.opacity = 0.3;
                    card.classList.remove('active');
                }
            });
        }

        nextBtn.onclick = (e) => { e.stopPropagation(); if(currentIndex < cards.length-1) { currentIndex++; updateCarousel(); } };
        prevBtn.onclick = (e) => { e.stopPropagation(); if(currentIndex > 0) { currentIndex--; updateCarousel(); } };
        
        cards.forEach((card, i) => card.onclick = () => currentIndex === i ? openGallery(i) : (currentIndex=i, updateCarousel()));

        function openGallery(idx) {
            const container = document.getElementById('masonryContainer');
            document.getElementById('galleryTitle').innerText = albumTitlesForGallery[idx];
            container.innerHTML = ''; 
            albumData[idx].forEach((url) => {
                const item = document.createElement('div');
                item.className = 'masonry-item';
                item.innerHTML = `<img src="${url}" loading="lazy" onerror="this.parentElement.style.display='none'">`;
                item.onclick = () => openLightbox(url); 
                container.appendChild(item);
            });
            document.getElementById('galleryOverlay').classList.add('open');
            document.body.classList.add('no-scroll');
        }

        function closeGallery() { 
            document.getElementById('galleryOverlay').classList.remove('open'); 
            document.body.classList.remove('no-scroll');
        }

        function openLightbox(url) { 
            document.getElementById('lightboxImage').src = url;
            document.getElementById('lightboxOverlay').classList.add('open'); 
        }
        function closeLightbox() { document.getElementById('lightboxOverlay').classList.remove('open'); }

        updateCarousel();
        window.onresize = updateCarousel;
    </script>
</body>
</html>
